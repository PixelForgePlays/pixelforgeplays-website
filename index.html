<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Forge Plays • Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-xl mx-auto px-6 py-16">
    
    <!-- Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold tracking-tight">Pixel Forge Plays</h1>
      <p class="text-xl text-zinc-400 mt-3">No bullshit. Fully transparent. Verified CLV.</p>
    </div>

    <!-- Form -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 mb-8">
      <h2 class="text-2xl font-semibold mb-6">Join the Waitlist</h2>
      
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-5">
        
        <!-- Email -->
        <input type="email" name="email" placeholder="Your email address" required
               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500">

        <!-- Sport Preference -->
        <div>
          <label class="block text-sm text-zinc-400 mb-1.5">Which sport interests you most?</label>
          <select name="sport" class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 text-white">
            <option value="">Select one (optional)</option>
            <option value="Boxing">Boxing</option>
            <option value="MLB">MLB</option>
            <option value="NBA">NBA</option>
            <option value="NFL">NFL</option>
            <option value="NHL">NHL</option>
            <option value="Other">Other</option>
            <option value="Tennis">Tennis</option>
            <option value="UFC">UFC</option>
          </select>
        </div>

        <!-- Why Joining -->
        <div>
          <label class="block text-sm text-zinc-400 mb-1.5">Why are you joining? (optional)</label>
          <textarea name="why" rows="3" placeholder="What are you hoping to get from this?"
                    class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500"></textarea>
        </div>

        <button type="submit"
                class="w-full bg-white hover:bg-zinc-200 transition text-black font-semibold py-3 rounded-lg mt-2">
          Join Waitlist
        </button>
      </form>
    </div>

    <!-- Discord Section -->
    <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-6 text-center">
      <h3 class="font-semibold mb-2">Join the early community</h3>
      <p class="text-zinc-400 text-sm mb-4">Discord access coming soon for waitlist members</p>
      <button disabled class="bg-zinc-800 text-zinc-400 px-6 py-2 rounded-lg text-sm cursor-not-allowed">
        Coming Soon
      </button>
    </div>

    <!-- Footer -->
    <div class="text-center mt-10 text-sm text-zinc-500">
      Launching September 2026<br>
      <span class="text-zinc-400">Every pick posted. Every result tracked.</span>
    </div>

  </div>
</body>
</html>
