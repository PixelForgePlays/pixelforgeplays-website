<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Forge Plays - Waitlist</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-2xl mx-auto px-6 py-16">
    <h1 class="text-4xl font-bold mb-4">Pixel Forge Plays</h1>
    <p class="text-xl text-zinc-400 mb-8">No bullshit. Fully transparent. Verified CLV.</p>

    <div class="bg-zinc-900 p-8 rounded-2xl">
      <h2 class="text-2xl font-semibold mb-6">Join the Waitlist</h2>
      
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-4">
        <input type="email" name="email" placeholder="Your email" required 
               class="w-full bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-3">
        
        <button type="submit" 
                class="w-full bg-white text-black font-semibold py-3 rounded-lg hover:bg-zinc-200 transition">
          Join Waitlist
        </button>
      </form>
    </div>

    <p class="text-center text-zinc-500 mt-8 text-sm">
      Launching September 2026
    </p>
  </div>
</body>
</html>
